spring.application.name=resumeanalyzer

# Railway deploy-ல் env variables automatically set ஆகும்
# Local-ல் run பண்ண: localhost values use ஆகும்
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/resume_analyzer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Railway dynamic port support
server.port=${PORT:8080}
